<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TicketRoyal | Secure Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Stripe JS -->
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --tr-primary: #0A2540;
            --tr-primary-dark: #051E30;
            --tr-secondary: #0066B4;
            --tr-accent: #F5A623;
            --tr-accent-dark: #E09112;
            --tr-white: #FFFFFF;
            --tr-gray-bg: #F6F9FC;
            --tr-card-border: #EAF0F6;
            --tr-text-dark: #1A2C3E;
            --tr-text-muted: #5C6F87;
            --tr-text-light: #8B9AB0;
            --tr-success: #10B981;
            --tr-danger: #DC2626;
            --tr-border-radius: 28px;
            --tr-shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --tr-shadow-md: 0 8px 24px rgba(0,0,0,0.06);
            --tr-transition: all 0.25s ease;
        }

        body {
            background: var(--tr-gray-bg);
            font-family: 'Inter', sans-serif;
            color: var(--tr-text-dark);
        }

        /* Navigation */
        .top-nav-bar {
            background: var(--tr-white);
            border-bottom: 1px solid var(--tr-card-border);
            padding: 14px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 40px; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { width: 38px; height: 38px; background: linear-gradient(135deg, var(--tr-primary), var(--tr-secondary)); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .logo-icon i { font-size: 18px; color: var(--tr-accent); }
        .logo-text { font-size: 20px; font-weight: 800; color: var(--tr-primary); }
        .logo-text span { color: var(--tr-accent); }
        .nav-links { display: flex; gap: 28px; }
        .nav-links a { text-decoration: none; color: var(--tr-text-muted); font-weight: 500; font-size: 14px; transition: var(--tr-transition); }
        .nav-links a:hover { color: var(--tr-secondary); }
        .cart-icon { background: var(--tr-primary); color: white; width: 38px; height: 38px; border-radius: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--tr-transition); }
        .cart-icon:hover { background: var(--tr-secondary); }
        .hamburger { display: none; background: none; border: none; cursor: pointer; }
        .hamburger span { display: block; width: 22px; height: 2px; background: var(--tr-primary); margin: 5px 0; }

        /* Sidebar */
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 200; }
        .sidebar-overlay.open { display: block; }
        .sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--tr-white); z-index: 201; transition: right 0.3s ease; display: flex; flex-direction: column; }
        .sidebar.open { right: 0; }
        .sidebar-header { padding: 24px 20px; border-bottom: 1px solid var(--tr-card-border); display: flex; justify-content: space-between; }
        .sidebar-menu { flex: 1; padding: 16px 0; }
        .sidebar-item { display: flex; align-items: center; gap: 14px; padding: 14px 20px; width: 100%; background: none; border: none; font-family: 'Inter'; font-weight: 500; cursor: pointer; color: var(--tr-text-dark); }
        .sidebar-item:hover { background: var(--tr-gray-bg); color: var(--tr-secondary); }
        .close-sidebar { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--tr-text-muted); }

        /* Container */
        .payment-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 32px;
        }

        /* Payment Form */
        .payment-card {
            background: var(--tr-white);
            border-radius: var(--tr-border-radius);
            padding: 32px;
            border: 1px solid var(--tr-card-border);
        }
        .payment-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--tr-primary);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--tr-text-dark);
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--tr-card-border);
            border-radius: 16px;
            font-family: 'Inter';
            font-size: 14px;
            transition: var(--tr-transition);
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--tr-secondary);
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Stripe Card Element */
        #card-element {
            padding: 14px 16px;
            border: 1.5px solid var(--tr-card-border);
            border-radius: 16px;
            background: var(--tr-white);
            transition: var(--tr-transition);
        }
        #card-element:focus, #card-element.StripeElement--focus {
            border-color: var(--tr-secondary);
        }
        .card-errors {
            color: var(--tr-danger);
            font-size: 12px;
            margin-top: 8px;
        }

        /* Order Summary */
        .order-summary {
            background: var(--tr-white);
            border-radius: var(--tr-border-radius);
            padding: 32px;
            border: 1px solid var(--tr-card-border);
            position: sticky;
            top: 100px;
        }
        .summary-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--tr-card-border);
        }
        .event-detail {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--tr-card-border);
        }
        .event-name {
            font-weight: 700;
            margin-bottom: 6px;
        }
        .event-venue, .event-date {
            font-size: 12px;
            color: var(--tr-text-muted);
            margin-bottom: 4px;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--tr-card-border);
            font-weight: 700;
            font-size: 18px;
        }
        .btn-pay {
            width: 100%;
            background: var(--tr-primary);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--tr-transition);
            margin-top: 24px;
            font-family: 'Inter';
        }
        .btn-pay:hover {
            background: var(--tr-secondary);
            transform: translateY(-2px);
        }
        .btn-pay:disabled {
            background: var(--tr-text-light);
            cursor: not-allowed;
            transform: none;
        }
        .secure-badges {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .secure-badge {
            font-size: 11px;
            color: var(--tr-text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Loading Overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 500;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 16px;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: var(--tr-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            color: white;
            font-size: 14px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--tr-danger);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 400;
            display: none;
        }

        @media (max-width: 900px) {
            .top-nav-bar { padding: 12px 20px; }
            .nav-links, .cart-icon { display: none; }
            .hamburger { display: block; }
            .payment-container { grid-template-columns: 1fr; padding: 24px 16px; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <div class="top-nav-bar">
        <div class="nav-left">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-crown"></i></div>
                <div class="logo-text">Ticket<span>Royal</span></div>
            </a>
            <div class="nav-links">

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    </div>

    <!-- Main Payment Container -->
    <div class="payment-container">
        <!-- Payment Form -->
        <div class="payment-card">
            <h2 class="payment-title">Payment Details</h2>
            
            <div class="form-group">
                <label>Cardholder Name</label>
                <input type="text" id="cardholder-name" placeholder="John Smith" autocomplete="off">
            </div>

            <div class="form-group">
                <label>Card Information</label>
                <div id="card-element"></div>
                <div id="card-errors" class="card-errors" role="alert"></div>
            </div>

            <div class="row-2">
                <div class="form-group">
                    <label>Country</label>
                    <select id="country" style="width:100%; padding:14px 16px; border:1.5px solid var(--tr-card-border); border-radius:16px; font-family:'Inter';">
                        <option value="US">United States</option>
                        <option value="GB">United Kingdom</option>
                        <option value="CA">Canada</option>
                        <option value="AU">Australia</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ZIP / Postal Code</label>
                    <input type="text" id="postal-code" placeholder="90210">
                </div>
            </div>

            <div class="secure-badges">
                <span class="secure-badge"><i class="fas fa-lock"></i> Secure payment</span>
                <span class="secure-badge"><i class="fas fa-shield-alt"></i> 3D Secure</span>
                <span class="secure-badge"><i class="fas fa-credit-card"></i> Visa • Mastercard • Amex</span>
            </div>

            <button class="btn-pay" id="pay-button">Pay Now</button>
        </div>

        <!-- Order Summary -->
        <div class="order-summary" id="orderSummary">
            <div class="summary-title">Order Summary</div>
            <div class="event-detail" id="eventDetails">

            </div>
            <div class="price-row">
                <span>Subtotal</span>

            </div>
            <div class="price-row">
                <span>Booking Fee</span>
                <span id="bookingFee">$0.00</span>
            </div>
            <div class="price-row">
                <span>Delivery Fee</span>
                <span id="deliveryFee">$0.00</span>
            </div>
            <div class="total-row">
                <span>Total (USD)</span>
                <span id="totalAmount">$0.00</span>
            </div>
            <div class="secure-badges" style="justify-content: center; margin-top: 20px;">
                <span class="secure-badge"><i class="fas fa-check-circle"></i> 150% Guarantee</span>
                <span class="secure-badge"><i class="fas fa-headset"></i> 24/7 Support</span>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">

        <div class="loading-text">Processing your payment...</div>

    <script>

        // Create Card Element
        const cardElement = elements.create('card', {
            style: {
                base: {
                    fontSize: '14px',
                    fontFamily: 'Inter, sans-serif',
                    color: '#1A2C3E',
                    '::placeholder': { color: '#8B9AB0' }
                }

        });
        cardElement.mount('#card-element');

        // Handle card errors
        cardElement.addEventListener('change', function(event) {
            const displayError = document.getElementById('card-errors');
            if (event.error) {
                displayError.textContent = event.error.message;
            } else {

        // Get order data from sessionStorage
        let selectedEvent = null;
        let orderTotal = 0;

        function loadOrderData() {
            const savedEvent = sessionStorage.getItem('selectedEvent');
            const savedCheckout = sessionStorage.getItem('checkoutData');
            
            if (savedEvent) {
                selectedEvent = JSON.parse(savedEvent);
            }
            
            if (savedCheckout) {
                const checkoutData = JSON.parse(savedCheckout);
                bookingFee = checkoutData.bookingFee || (selectedEvent?.price * 0.3) || 0;
                deliveryFee = checkoutData.deliveryFee || 0;

                bookingFee = Math.round(selectedEvent.price * 0.3);
                deliveryFee = 0;
            }
            
            if (selectedEvent) {
                orderTotal = (selectedEvent.price || 0) + bookingFee + deliveryFee;
                
                document.getElementById('eventDetails').innerHTML = `
                    <div class="event-name">${selectedEvent.name || 'Event Ticket'}</div>
                    <div class="event-venue"><i class="fas fa-map-marker-alt"></i> ${selectedEvent.venue || 'Venue'}</div>
                    <div class="event-date"><i class="far fa-calendar-alt"></i> ${selectedEvent.date || 'Date TBD'}</div>
                    <div style="margin-top: 12px;"><strong>Quantity:</strong> 1</div>
                `;
                document.getElementById('subtotal').innerHTML = `$${selectedEvent.price?.toFixed(2) || '0.00'}`;
                document.getElementById('bookingFee').innerHTML = `$${bookingFee.toFixed(2)}`;
                document.getElementById('deliveryFee').innerHTML = `$${deliveryFee.toFixed(2)}`;
                document.getElementById('totalAmount').innerHTML = `$${orderTotal.toFixed(2)}`;
            } else {
                // Demo data if no event selected
                document.getElementById('eventDetails').innerHTML = `
                    <div class="event-name">FIFA World Cup 2026: USA vs Mexico</div>
                    <div class="event-venue"><i class="fas fa-map-marker-alt"></i> MetLife Stadium, New Jersey</div>
                    <div class="event-date"><i class="far fa-calendar-alt"></i> Jun 11, 2026 • 8:00 PM</div>
                    <div style="margin-top: 12px;"><strong>Quantity:</strong> 1</div>
                `;
                document.getElementById('subtotal').innerHTML = '$249.00';
                document.getElementById('bookingFee').innerHTML = '$74.70';
                document.getElementById('deliveryFee').innerHTML = '$0.00';
                document.getElementById('totalAmount').innerHTML = '$323.70';
                orderTotal = 323.70;
            }
        }

        // Simulate Payment (Demo Mode)

        async function processPayment() {
            const cardholderName = document.getElementById('cardholder-name').value;
            const postalCode = document.getElementById('postal-code').value;
            
            if (!cardholderName) {
                showToast('Please enter cardholder name');
                return false;
            }
            
            const payButton = document.getElementById('pay-button');
            payButton.disabled = true;
            payButton.textContent = 'Processing...';
            document.getElementById('loadingOverlay').classList.add('active');
            
            // Simulate payment processing delay
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // Generate random order number
            const orderNumber = 'TR-' + Math.floor(Math.random() * 1000000) + '-' + Date.now();
            
            // Store order data for confirmation page
            const orderData = {
                orderNumber: orderNumber,
                eventName: selectedEvent?.name || 'FIFA World Cup 2026: USA vs Mexico',
                eventVenue: selectedEvent?.venue || 'MetLife Stadium, New Jersey',
                eventDate: selectedEvent?.date || 'Jun 11, 2026',
                subtotal: selectedEvent?.price || 249,
                bookingFee: bookingFee,
                deliveryFee: deliveryFee,
                total: orderTotal,
                customerEmail: sessionStorage.getItem('customerEmail') || 'customer@example.com',
                paymentDate: new Date().toLocaleString()
            };
            
            sessionStorage.setItem('orderData', JSON.stringify(orderData));
            
            document.getElementById('loadingOverlay').classList.remove('active');
            
            // Redirect to confirmation page
            window.location.href = 'confirmation.html';
            
            return true;
        }

        //             }
        //         });
        //         
        //         if (result.error) {
        //             showToast(result.error.message);
        //             payButton.disabled = false;
        //             payButton.textContent = 'Pay Now';
        //             document.getElementById('loadingOverlay').classList.remove('active');

        //             if (result.paymentIntent.status === 'succeeded') {

        //         showToast('Payment failed. Please try again.');
        //         payButton.disabled = false;
        //         payButton.textContent = 'Pay Now';
        //         document.getElementById('loadingOverlay').classList.remove('active');

        // Attach payment handler
        document.getElementById('pay-button').addEventListener('click', processPayment);

        // Helper functions
        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        // Load order data on page load
        loadOrderData();
    </script>
</body>
